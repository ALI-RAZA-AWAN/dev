<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>landing page</title>
    <style>
        *{
    margin:0px;
    padding:0px;
    box-sizing:border-box;
    font-family: Georgia, 'Times New Roman', Times, serif;
    

}
html, body{
    width: 100%;
    height: 100%;
}
.main{
    height: 100%;
    width: 100%;
    position: relative;
}
.nav{
    height: 10%;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1vw 2vw;
    border-bottom: 1px solid #dadada;
}
.nav h3{
    font-size: 2vw;
}
.nav2{
    display: flex;
    gap: 3vw;

}
.nav2 h3{
    display: none;
}
.nav2 h4 a{
    text-decoration: none;
    color: black;
}
.nav2 h4 a:hover{
    font-size:1.5vw ;
    color:red;
}
.nav2 h4{
    font-size: 1.4vw;
}
.content{
    height: 90%;
    width: 100%;
    background-color: burlywood;
}

@media (max-width:600px){
    .nav{
        background-color: aqua;
        color:antiquewhite;
        
    }
    .nav h3{
        font-size: 6vw;
    }
    .nav2 h3{
        display: block;
    }
    .nav h4{
        display: none;
    }
}

    </style>

</head>
<body>
    <div class="main">
        <div class="nav">
            <h3>SIGNAL</h3>
            <div class="nav2">
                <h4><a href="">Home</a></h4>
                <h4><a href="">Services</a></h4>
                <h4><a href="">Contact </a></h4>
                <h4><a href="">Account </a></h4>
                <h3>Icons</h3>
            </div>
        </div>
        <div class="content"></div>
    </div>
</body>
</html>
