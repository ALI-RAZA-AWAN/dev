<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>landing page</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;


        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        .main {
            height: 100%;
            width: 100%;
            position: relative;
        }

        .nav {
            height: 10%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1vw 4vw;
            border-bottom: 1px solid #dadada;
        }

        .nav h3 {
            font-size: 2vw;
        }

        .nav2 {
            display: flex;
            gap: 3vw;

        }

        .nav2 h3 {
            display: none;
        }

        .nav2 h4 a {
            text-decoration: none;
            color: black;
        }

        .nav2 h4 a:hover {
            font-size: 1.5vw;
            color: lightseagreen;
        }

        .nav2 h4 {
            font-size: 1.4vw;
        }

        .content {
            height: 90%;
            width: 100%;
            /* background-color: burlywood; */
            display: flex;
            position: relative;
        }


        .left {
            height: 100%;
            width: 55%;
            /* background-color: blueviolet;  */
            padding: 5vw 4vw;

        }

        .left h3 {
            font-size: 4.2vw;
            font-weight: 550;
        }

        .left h3 span {
            color: lightseagreen;
            font-weight: 600;
        }

        .left p {
            font-size: 1.2vw;
            font-weight: 500;
            color: #666;
            padding-top: 2vw;
            padding-bottom: 4vw;
            width: 80%;
        }

        .right {
            height: 100%;
            width: 45%;
            /* background-color: rgb(43, 226, 73); */

        }

        button {
            font-size: 1.4vw;
            padding: 1vw 2vw;
            background-color: lightseagreen;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: 300;
        }

        .right img {
            height: 80%;
            width: 90%;
            margin-top: 10%;
        }
        /* 1. This part handles the mobile layout (when screen is narrow) */
@media (max-width: 600px) {
    .nav {
        height: 60px; /* Use a fixed height for mobile */
    }
    
    .nav h4 {
        display: none; /* Hide the menu links on mobile */
    }
    .nav h3{
        font-size: 6vw;
    }
    .nav2 h3 {
        display: block; /* Show a menu icon/text on mobile */
        font-size: 5vw;
        
    }

    .content {
        flex-direction: column; /* Stack left and right vertically */
    }

    .left, .right {
        width: 100%; /* Force full width on mobile */
        height: auto;
    }

    .left h3 {
        font-size: 10vw; /* Adjust font size for smaller screens */
    }
    .left p{
        font-size: 3vw;
        color: #666;
        width: 80%;
        margin-top: 4vw;
        margin-bottom: 4vw;
    }
    .content button{
        padding:2vw 6vw;
        font-size: 4vw;
    }
    
}

        
    </style>

</head>

<body>
    <div class="main">
        <div class="nav">
            <h3>LOGO</h3>
            <div class="nav2">
                <h4><a href="">Home</a></h4>
                <h4><a href="">Services</a></h4>
                <h4><a href="">Contact </a></h4>
                <h4><a href="">Account </a></h4>
                <h3>+</h3>
            </div>
        </div>
        <div class="content">
            <div class="left">
                <h3>You have been <span>choosen</span> for making the History. </h3>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem molestiae asperiores temporibus vel
                    nobis harum aliquam illo impedit commodi quas.</p>
                <button>Hit Me !</button>
            </div>
            <div class="right">
                <img src="/2.png" alt="">
            </div>
        </div>
    </div>
</body>

</html>
